                                                    • Red-Black SOR Pressure Projection<br/>
                                                    • Semi-Lagrangian Advection
                                                </div>
                                                <div>
                                                    <strong>Aerodynamic Models:</strong><br/>
                                                    • Smagorinsky SGS (LES Turbulence)<br/>
                                                    • Prandtl-Glauert Compressibility<br/>
                                                    • Bernoulli Static Pressure Extraction
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TAB 2: PLOTS */}
                            {reportTab === 'plots' && (
                                <div className="grid grid-cols-1 gap-6 h-full flex-col">
                                    <div className="bg-white p-5 rounded border border-slate-200 shadow-sm flex-1 flex flex-col min-h-[400px]">
                                        <div className="flex justify-between items-center mb-2">
                                            <h3 className="text-xs font-bold uppercase tracking-widest text-slate-400">CFD vs Panel Method: Pressure Distribution (C_p)</h3>
                                            <span className="text-[10px] font-mono bg-slate-100 px-2 py-1 rounded border text-slate-500">Dashed Lines = Ideal Inviscid Approximation</span>
                                        </div>
                                        <div className="flex-1 w-full relative">
                                            <DistributionChart 
                                              data={cpData} 
                                              keys={['cpu', 'cpl', 'panelCpU', 'panelCpL']} 
                                              colors={['#0ea5e9', '#f43f5e', '#94a3b8', '#94a3b8']} 
                                              labels={['Viscous Upper', 'Viscous Lower', 'Ideal Upper', 'Ideal Lower']}
                                              isMatlab={true}
                                              invertY={true}
                                            />
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 rounded border border-slate-200 shadow-sm flex-1 flex flex-col min-h-[300px]">
                                        <h3 className="text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Skin Friction Distribution (C_f × 100)</h3>
                                        <div className="flex-1 w-full relative">
                                            <DistributionChart 
                                              data={cpData} 
                                              keys={['cfu', 'cfl']} 
                                              colors={['#8b5cf6', '#d946ef']} 
                                              labels={['Upper Surface', 'Lower Surface']}
                                              isMatlab={true}
                                              invertY={false}
                                            />
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TAB 3: DATA TABLE */}
                            {reportTab === 'data' && (
                                <div className="bg-white rounded border border-slate-200 shadow-sm h-full flex flex-col overflow-hidden">
                                    <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                                        <h3 className="text-xs font-bold uppercase tracking-widest text-slate-500">Spatial Chordwise Data (x/c)</h3>
                                        <button onClick={() => handleExportCSV('cp')} className="flex items-center space-x-1 bg-white hover:bg-slate-100 text-indigo-600 border border-indigo-200 px-3 py-1.5 rounded text-xs font-bold shadow-sm transition">
                                            <IconDownload size={12} /> <span>Download CSV</span>
                                        </button>
                                    </div>
                                    <div className="flex-1 overflow-auto report-scroll">
                                        <table className="min-w-full text-sm text-right font-mono border-collapse">
                                            <thead className="bg-slate-100 text-slate-500 sticky top-0 shadow-sm z-10">
                                                <tr>
                                                    <th className="px-4 py-3 text-left border-b border-slate-200 font-bold">x/c (Chord)</th>
                                                    <th className="px-4 py-3 border-b border-slate-200 text-sky-600">Cp (Upper)</th>
                                                    <th className="px-4 py-3 border-b border-slate-200 text-rose-600">Cp (Lower)</th>
                                                    <th className="px-4 py-3 border-b border-slate-200 text-slate-400 font-normal">Ideal Cp (Up)</th>
                                                    <th className="px-4 py-3 border-b border-slate-200 text-slate-400 font-normal">Ideal Cp (Low)</th>
                                                    <th className="px-4 py-3 border-b border-slate-200 text-violet-500">Cf (Upper)</th>
                                                    <th className="px-4 py-3 border-b border-slate-200 text-fuchsia-500">Cf (Lower)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="text-slate-600">
                                                {cpData.length === 0 ? (
                                                    <tr><td colSpan="7" className="text-center py-8 text-slate-400 italic">No data generated yet. Run simulation first.</td></tr>
                                                ) : (
                                                    cpData.map((row, i) => (
                                                        <tr key={i} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                                            <td className="px-4 py-2 text-left font-bold text-slate-700">{row.x.toFixed(4)}</td>
                                                            <td className="px-4 py-2 text-sky-700">{(row.cpu || 0).toFixed(4)}</td>
                                                            <td className="px-4 py-2 text-rose-700">{(row.cpl || 0).toFixed(4)}</td>
                                                            <td className="px-4 py-2 text-slate-400">{(row.panelCpU || 0).toFixed(4)}</td>
                                                            <td className="px-4 py-2 text-slate-400">{(row.panelCpL || 0).toFixed(4)}</td>
                                                            <td className="px-4 py-2 text-violet-600">{(row.cfu || 0).toFixed(4)}</td>
                                                            <td className="px-4 py-2 text-fuchsia-600">{(row.cfl || 0).toFixed(4)}</td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

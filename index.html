        const IconFilm = ({ size=16, className="" }) => <svg className={className} width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>;

        // --- CONFIGURATIONS ---
        const FLUIDS = {
          air: { name: "Air (Gas)", density: 1.225, r: 255, g: 255, b: 255, tracer: 'rgba(255, 255, 255, 0.9)', glow: '#ffffff', bg: [2, 6, 23], nu: 1.48e-5, sigma: 0 },
          water: { name: "Water (Liquid)", density: 997, r: 100, g: 200, b: 255, tracer: 'rgba(150, 230, 255, 0.8)', glow: '#00bfff', bg: [0, 15, 35], nu: 1.00e-6, sigma: 0.15 },
        };

        const PRESETS = {
          custom: { name: "Custom 2D Setup", aoa: 10, mach: 0.15, flap: false, ground: false, fluid: "air", view: "pressure", vof: false, is3D: false, optMode: 'naca', useFSI: false, contactAngle: 90 },
          transonic: { name: "Transonic Shockwaves", aoa: 2, mach: 0.85, flap: false, ground: false, fluid: "air", view: "schlieren", vof: false, is3D: false, optMode: 'naca' },
          vof_3d: { name: "3D Multiphase VOF (CLSVOF)", aoa: 15, mach: 0.1, flap: true, ground: true, fluid: "water", view: "vof", vof: true, is3D: true, optMode: 'naca', useFSI: false, contactAngle: 90 },
          fsi_wetting: { name: "FSI & Contact Angles (Lotus Effect)", aoa: 0, mach: 0.05, flap: false, ground: true, fluid: "water", view: "vof", vof: true, is3D: false, optMode: 'empty', useFSI: true, contactAngle: 150 },
          inverse_topology: { name: "Inverse Topology Opt (Breakwater)", aoa: 0, mach: 0.1, flap: false, ground: true, fluid: "water", view: "vof", vof: true, is3D: false, optMode: "topology", useFSI: false, contactAngle: 90 },
          microfluidics: { name: "Microfluidics (Marangoni)", aoa: 0, mach: 0.05, flap: false, ground: false, fluid: "water", view: "temperature", vof: true, is3D: false, optMode: 'empty', useFSI: false, contactAngle: 90 }
        };

        // --- GEOMETRY ---
        function generateNACA(code, n = 200, isFlap = false) { 
          let safeCode = (code || "").toString().replace(/[^0-9]/g, '');
          if (safeCode.length !== 4) safeCode = isFlap ? "0012" : "2412";
          const m = parseInt(safeCode[0]) / 100.0; const p = parseInt(safeCode[1]) / 10.0; const t = parseInt(safeCode.substring(2, 4)) / 100.0;
          const x = []; for (let i = 0; i < n; i++) x.push(0.5 * (1 - Math.cos(Math.PI * i / (n - 1))));
          const yt = x.map(xi => 5 * t * (0.2969 * Math.sqrt(xi) - 0.1260 * xi - 0.3516 * Math.pow(xi, 2) + 0.2843 * Math.pow(xi, 3) - 0.1015 * Math.pow(xi, 4)));
          const yc = [], dyc = [];
          for (const xi of x) {
            if (p > 0 && xi < p) { yc.push((m / Math.pow(p, 2)) * (2 * p * xi - Math.pow(xi, 2))); dyc.push((2 * m / Math.pow(p, 2)) * (p - xi)); } 
            else if (p > 0) { yc.push((m / Math.pow(1 - p, 2)) * ((1 - 2 * p) + 2 * p * xi - Math.pow(xi, 2))); dyc.push((2 * m / Math.pow(1 - p, 2)) * (p - xi)); } 
            else { yc.push(0.0); dyc.push(0.0); }
          }
          const xu = [], yu = [], xl = [], yl = [];
          for (let i = 0; i < n; i++) {
            const theta = Math.atan(dyc[i] || 0);
            xu.push(x[i] - yt[i] * Math.sin(theta)); yu.push(yc[i] + yt[i] * Math.cos(theta)); xl.push(x[i] + yt[i] * Math.sin(theta)); yl.push(yc[i] - yt[i] * Math.cos(theta));
          }
          const coords = [];
          for (let i = n - 1; i >= 0; i--) coords.push({ x: xu[i], y: yu[i] });
          for (let i = 1; i < n; i++) coords.push({ x: xl[i], y: yl[i] });
          return coords;
        }

        function applyPlainFlap(coords, hingeX, flapAngleDeg) {
          if (flapAngleDeg === 0) return coords;
          const angleRad = -(flapAngleDeg * Math.PI) / 180;
          const cosA = Math.cos(angleRad), sinA = Math.sin(angleRad);
          return coords.map(pt => {
            if (pt.x <= hingeX) return { ...pt }; const dx = pt.x - hingeX, dy = pt.y;
            return { x: hingeX + dx * cosA - dy * sinA, y: dx * sinA + dy * cosA };
          });
        }

        function buildMultiElement(mainCode, useFlap, flapAngleDeg, flapGap, flapOverlap) {
            let main = generateNACA(mainCode, 150); let polys = [{ coords: main, type: 'main' }];
            if (useFlap) {
                main = main.filter(pt => pt.x < 0.85); main.push({x: 0.85, y: 0}); polys[0].coords = main;
                let flap = generateNACA("4412", 100, true);
                const flapScale = 0.3; const flapAngle = flapAngleDeg * Math.PI / 180; const hingeX = 0.85 - flapOverlap; const hingeY = flapGap;
                flap = flap.map(pt => {
                    const sx = pt.x * flapScale; const sy = pt.y * flapScale;
                    const rx = sx * Math.cos(flapAngle) - sy * Math.sin(flapAngle); const ry = sx * Math.sin(flapAngle) + sy * Math.cos(flapAngle);
                    return { x: rx + hingeX, y: ry + hingeY };
                });
                polys.push({ coords: flap, type: 'flap' });
            } else { polys[0].coords = applyPlainFlap(main, 0.75, flapAngleDeg); }
            return polys;
        }

        function transformPolys(polys, chordLength, cx, cy, aoa_deg) {
          const aoa_rad = -aoa_deg * Math.PI / 180; const cosA = Math.cos(aoa_rad), sinA = Math.sin(aoa_rad);
          return polys.map(poly => ({
             type: poly.type, coords: poly.coords.map(pt => {
                const dx = pt.x - 0.25, dy = pt.y; return { x: cx + (dx * cosA - dy * sinA) * chordLength, y: cy - (dx * sinA + dy * cosA) * chordLength };
             })
          }));
        }

        function buildBreakwaterPolygon(nx, ny, h_ratio, w_ratio, angle_deg) {
            const angleRad = angle_deg * Math.PI / 180; const cx = nx * 0.4; const cy = ny; const hw = (nx * w_ratio) / 2; const hh = ny * h_ratio;
            const rawPts = [{x: -hw, y: 0}, {x: -hw, y: -hh}, {x: hw, y: -hh}, {x: hw, y: 0}];
            const coords = rawPts.map(pt => {
                const rx = pt.x * Math.cos(angleRad) - pt.y * Math.sin(angleRad); const ry = pt.x * Math.sin(angleRad) + pt.y * Math.cos(angleRad);
                return { x: cx + rx, y: cy + ry };
            });
            return [{ type: 'breakwater', coords: coords }];
        }

        function pointInPolygon(px, py, poly) {
          let inside = false;
          for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            const intersect = ((poly[i].y > py) !== (poly[j].y > py)) && (px < (poly[j].x - poly[i].x) * (py - poly[i].y) / (poly[j].y - poly[i].y) + poly[i].x);
            if (intersect) inside = !inside;
          }
          return inside;
        }

        // --- MULTIPHASE VOF PHYSICS ENGINE WITH FSI & CONTACT ANGLES ---
        class FluidSolver {
          constructor(nx, ny, h) {
            this.nx = nx; this.ny = ny; this.h = h; this.numCells = nx * ny;
            this.U = new Float32Array((nx + 1) * ny); this.V = new Float32Array(nx * (ny + 1));
            this.newU = new Float32Array((nx + 1) * ny); this.newV = new Float32Array(nx * (ny + 1));
            this.P = new Float32Array(this.numCells);
            this.s = new Float32Array(this.numCells);
            this.s_static = new Float32Array(this.numCells); // Separated static geometry for dynamic FSI layering
            this.m = new Float32Array(this.numCells); this.newM = new Float32Array(this.numCells);
            
            // FSI Buoy Rigid Body
            this.buoy = { active: false, x: nx * 0.5, y: ny * 0.3, vx: 0, vy: 0, r: 6, mass: 60 };

            // Thermal & Marangoni Arrays
            this.T = new Float32Array(this.numCells); this.newT = new Float32Array(this.numCells);

            // CLSVOF Arrays
            this.vof = new Float32Array(this.numCells); this.newVof = new Float32Array(this.numCells);
            this.eddyVisc = new Float32Array(this.numCells); this.gradP = new Float32Array(this.numCells); 
            
            // Surface Tension Normals
            this.nx_dir = new Float32Array(this.numCells); this.ny_dir = new Float32Array(this.numCells);

            this.s_static.fill(1); this.s.fill(1);
            this.chordLen = 1; this.quarterChordX = nx * 0.35; this.quarterChordY = ny * 0.5;
            this.currentPolys = []; this.groundYPixel = -1;
          }

          updateGeometry(optMode, topoGenes, nacaCode, aoa, useFlap, flapAngle, flapGap, flapOverlap, useGround, rideHeight, chordLen) {
            this.s_static.fill(1.0);
            for (let i = 0; i < this.nx; i++) { this.s_static[i] = 0.0; this.s_static[i + (this.ny - 1) * this.nx] = 0.0; }
            this.chordLen = chordLen; this.quarterChordX = this.nx * 0.35; this.quarterChordY = this.ny * 0.5;

            this.groundYPixel = -1;
            if (useGround) {
                this.groundYPixel = Math.floor(this.quarterChordY + chordLen * rideHeight);
                for (let i = 0; i < this.nx; i++) {
                    for (let j = this.groundYPixel; j < this.ny; j++) {
                        if (j >= 0 && j < this.ny) this.s_static[i + j * this.nx] = 0.0;
                    }
                }
            }

            if (optMode === 'empty') { this.currentPolys = []; } 
            else if (optMode === 'topology') { this.currentPolys = buildBreakwaterPolygon(this.nx, this.ny, topoGenes.h, topoGenes.w, topoGenes.theta); } 
            else {
                const rawPolys = buildMultiElement(nacaCode, useFlap, flapAngle, flapGap, flapOverlap);
                this.currentPolys = transformPolys(rawPolys, chordLen, this.quarterChordX, this.quarterChordY, aoa);
            }

            for (let i = 1; i < this.nx - 1; i++) {
              for (let j = 1; j < this.ny - 1; j++) {
                if (this.s_static[i + j * this.nx] === 0.0 && useGround && j >= this.groundYPixel) continue;
                let insideAny = false;
                for (const poly of this.currentPolys) { if (pointInPolygon(i, j, poly.coords)) { insideAny = true; break; } }
                if (insideAny) this.s_static[i + j * this.nx] = 0.0;
              }
            }
          }

          // Dynamic Layering of FSI Rigid Body over static geometry
          applyDynamicGeometry(useFSI) {
              this.s.set(this.s_static);
              this.buoy.active = useFSI;
              if (useFSI) {
                  const nx = this.nx, ny = this.ny; const br = this.buoy.r, bx = this.buoy.x, by = this.buoy.y; const brSq = br * br;
                  for(let i = Math.max(1, Math.floor(bx - br)); i <= Math.min(nx-2, Math.ceil(bx + br)); i++) {
                      for(let j = Math.max(1, Math.floor(by - br)); j <= Math.min(ny-2, Math.ceil(by + br)); j++) {
                          const dx = i - bx; const dy = j - by;
                          if (dx*dx + dy*dy <= brSq) {
                              this.s[i + j*nx] = 0.0;
                              // Immersed Moving Boundary Condition: Enforce velocity
                              this.U[i + j*(nx+1)] = this.buoy.vx; this.U[i+1 + j*(nx+1)] = this.buoy.vx;
                              this.V[i + j*nx] = this.buoy.vy; this.V[i + (j+1)*nx] = this.buoy.vy;
                          }
                      }
                  }
              }
          }

          updateFSI() {
              if (!this.buoy.active) return;
              const nx = this.nx, ny = this.ny; const br = this.buoy.r, bx = this.buoy.x, by = this.buoy.y;
              let displacedFluid = 0; let dragX = 0, dragY = 0; let count = 0;
              for(let i = Math.max(1, Math.floor(bx - br - 2)); i <= Math.min(nx-2, Math.ceil(bx + br + 2)); i++) {
                  for(let j = Math.max(1, Math.floor(by - br - 2)); j <= Math.min(ny-2, Math.ceil(by + br + 2)); j++) {
                      const dx = i - bx; const dy = j - by;
                      if (dx*dx + dy*dy <= (br+1.5)*(br+1.5)) {
                          if (dx*dx + dy*dy <= br*br) {
                             displacedFluid += this.vof[i + j*nx];
                          } else {
                             count++;
                             const u = 0.5*(this.U[i+j*(nx+1)]+this.U[i+1+j*(nx+1)]); const v = 0.5*(this.V[i+j*nx]+this.V[i+(j+1)*nx]);
                             dragX += (u - this.buoy.vx); dragY += (v - this.buoy.vy);
                          }
                      }
                  }
              }

          advectFields(dt) {

            return sx * sy * field[i + j * nx] + tx * sy * field[Math.min(i + 1, nx - 1) + j * nx] + sx * ty * field[i + Math.min(j + 1, ny - 1) * nx] + tx * ty * field[Math.min(i + 1, nx - 1) + Math.min(j + 1, ny - 1) * nx];

        // --- PLOTS ---
        const TelemetryChart = ({ data, lines, width = 300, height = 120, isMatlab = false }) => {

          const graphWidth = width - padding.left - padding.right; const graphHeight = height - padding.top - padding.bottom;
          let minVal = 9999, maxVal = -9999;

          if (minVal === maxVal) { minVal -= 0.1; maxVal += 0.1; }
          const pad = (maxVal - minVal) * 0.1; minVal -= pad; maxVal += pad;
          const xScale = graphWidth / Math.max(1, data.length - 1); const yScale = graphHeight / (maxVal - minVal);
          const mapY = (val) => padding.top + graphHeight - ((val - minVal) * yScale);
          const theme = isMatlab ? { bg: 'bg-white', line: '#cbd5e1', text: '#334155', border: 'border-slate-300' } : { bg: 'bg-slate-900', line: '#475569', text: '#94a3b8', border: 'border-slate-700' };

          return (
            <svg width="100%" height="100%" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" className={`${theme.bg} ${theme.border} border rounded-lg shadow-inner text-[10px] font-mono ${isMatlab ? 'matlab-grid' : ''}`}>
              <line x1={padding.left} y1={mapY(0)} x2={width - padding.right} y2={mapY(0)} stroke={theme.line} strokeDasharray="3 3" />
              <line x1={padding.left} y1={padding.top} x2={padding.left} y2={height - padding.bottom} stroke={theme.line} />
              <line x1={padding.left} y1={height - padding.bottom} x2={width - padding.right} y2={height - padding.bottom} stroke={theme.line} />
              {lines.map((line) => {
                const path = data.map((d, i) => `${padding.left + i * xScale},${mapY(d[line.key] * (line.scale || 1))}`).join(' L ');
                return <path key={line.key} d={`M ${path}`} fill="none" stroke={line.color} strokeWidth="2" strokeLinejoin="round" />;
              })}
              <text x={5} y={Math.max(10, mapY(maxVal) + 5)} fill={theme.text}>{(maxVal).toFixed(2)}</text>
              <text x={5} y={mapY(0) + 3} fill={theme.text}>0.00</text>
              <text x={5} y={Math.min(height - 5, mapY(minVal))} fill={theme.text}>{(minVal).toFixed(2)}</text>
              {lines.map((line, idx) => ( <text key={line.key} x={padding.left + 5 + (idx * 55)} y={padding.top + 5} fill={line.color} className="font-bold">{line.label}</text> ))}
            </svg>
          );
        };

        const DistributionChart = ({ data, keys, colors, labels, width = 300, height = 150, isMatlab = false, invertY = false }) => {
          if (!data || data.length === 0) return null;
          const padding = { top: 20, right: 15, bottom: 25, left: 35 };
          const graphWidth = width - padding.left - padding.right; const graphHeight = height - padding.top - padding.bottom;
          let minV = 999, maxV = -999;

          const xScale = (x) => padding.left + x * graphWidth;
          const yScale = (v) => { if (invertY) return padding.top + ((v - maxV) / (minV - maxV)) * graphHeight; return padding.top + graphHeight - ((v - minV) / (maxV - minV)) * graphHeight; };
          const theme = isMatlab ? { bg: 'bg-white', line: '#cbd5e1', text: '#334155', border: 'border-slate-300' } : { bg: 'bg-slate-900', line: '#475569', text: '#94a3b8', border: 'border-slate-700' };

              <svg width="100%" height="100%" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" className={`${theme.bg} ${theme.border} border rounded-lg shadow-inner text-[10px] font-mono ${isMatlab ? 'matlab-grid' : ''}`}>

                <line x1={padding.left} y1={height - padding.bottom} x2={width - padding.right} y2={height - padding.bottom} stroke={theme.line} />
                {keys.map((k, idx) => {
                    const validData = data.filter(d => d[k] !== undefined && !isNaN(d[k])); if (validData.length === 0) return null;
                    const path = validData.map(d => `${xScale(d.x)},${yScale(d[k])}`).join(' L ');

        const ColormapLegend = ({ mode }) => {

        // --- MAIN REACT COMPONENT ---
        function App() {

          const handleNacaInput = (e) => { setNacaCodeUI(e.target.value); updateSimState('nacaCode', e.target.value); setActivePreset("custom"); updateSimState('optMode', 'naca'); };

          const handlePresetChange = (presetKey) => {
            setActivePreset(presetKey); if (presetKey === 'custom') return;
            const p = PRESETS[presetKey];

                 } else if (mode === 'topology') {
                     const h = 0.1 + Math.random() * 0.5; const w = 0.05 + Math.random() * 0.1; const theta = -30 + Math.random() * 60;
                     initPop.push({ code: [h, w, theta], ld: -9999 });
                 }
              }
              engineState.current.gaPop = initPop; engineState.current.gaIndex = 0; engineState.current.gaGen = 1; engineState.current.bestLD = -9999;
          };

          const toggleOptimizer = () => {
            const newState = !engineState.current.isOptimizing;
            engineState.current.isOptimizing = newState; setIsOptimizing(newState); 
            if (newState) { initGA(); engineState.current.frames = 0; setOptDisplay({ bestCode: "-", bestLD: 0, gen: 1, mode: engineState.current.optMode }); }
          };

          useEffect(() => {
            fluidRef.current = new FluidSolver(simRes, Math.floor(simRes * gridRatio), 1.0);
            const canvas = canvasRef.current; if(!canvas) return; const ctx = canvas.getContext('2d', { alpha: false });
            let frameCount = 0; let smoothCl = 0, smoothCd = 0, smoothCm = 0, smoothRawL = 0, smoothRawD = 0, smoothRe = 0;
            const filterFactor = 0.1; let animReq;

            const getTurboColor = (v, vmin, vmax) => {
              let r = Math.max(0, Math.min(1, (v - vmin) / (vmax - vmin || 1)));
              if (engineState.current.viewMode === 'pressure') {
                  let red = r < 0.5 ? Math.floor(r * 2 * 255) : 255;
                  let grn = r < 0.5 ? Math.floor(r * 2 * 255) : Math.floor((1 - r) * 2 * 255);
                  let blu = r < 0.5 ? 255 : Math.floor((1 - r) * 2 * 255);
                  return (255 << 24) | (blu << 16) | (grn << 8) | red;
              }
              if (engineState.current.viewMode === 'temperature') {
                  let red = Math.min(255, Math.floor(r * 3 * 255));
                  let grn = Math.max(0, Math.min(255, Math.floor((r - 0.33) * 3 * 255)));
                  let blu = Math.max(0, Math.min(255, Math.floor((r - 0.66) * 3 * 255)));
                  return (255 << 24) | (blu << 16) | (grn << 8) | red;
              }
              let red = Math.max(0, Math.min(255, Math.floor(34.61 + r * (1172.33 - r * (3230.05 - r * (3330.31 - r * 1149.7))))));
              let grn = Math.max(0, Math.min(255, Math.floor(23.31 + r * (267.14 + r * (3213.95 - r * (5797.98 - r * 3010.8))))));
              let blu = Math.max(0, Math.min(255, Math.floor(106.5 - r * (205.58 - r * (1008.39 - r * (2560.77 - r * 1466.0))))));
              return (255 << 24) | (blu << 16) | (grn << 8) | red;
            };
            const getVorticityColor = (v) => { let r = 0, b = 0, g = 0; if (v > 0) { r = Math.min(255, v * 600); g = Math.min(255, v * 150); } else if (v < 0) { b = Math.min(255, -v * 600); g = Math.min(255, -v * 150); } return (255 << 24) | (b << 16) | (g << 8) | r; };
            const getSchlierenColor = (grad) => { let val = Math.min(255, grad * 5000); return (255 << 24) | (val << 16) | (val << 8) | val; };

            const renderPLIC = (scX, scY, f) => {
                ctx.beginPath(); ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 1.5; const iso = 0.5; const nx = f.nx, ny = f.ny;
                for (let i = 0; i < nx - 1; i++) {
                    for (let j = 0; j < ny - 1; j++) {
                        const v1 = f.vof[i + j * nx]; const v2 = f.vof[i + 1 + j * nx]; const v3 = f.vof[i + 1 + (j + 1) * nx]; const v4 = f.vof[i + (j + 1) * nx];
                        let state = 0; if (v1 > iso) state |= 8; if (v2 > iso) state |= 4; if (v3 > iso) state |= 2; if (v4 > iso) state |= 1;
                        if (state === 0 || state === 15) continue;
                        const interp = (vA, vB) => (iso - vA) / (vB - vA + 1e-6);
                        const ptA = { x: (i + interp(v1, v2)) * scX, y: j * scY }; const ptB = { x: (i + 1) * scX, y: (j + interp(v2, v3)) * scY };
                        const ptC = { x: (i + 1 - interp(v3, v4)) * scX, y: (j + 1) * scY }; const ptD = { x: i * scX, y: (j + interp(v1, v4)) * scY };
                        switch (state) {
                            case 1: case 14: ctx.moveTo(ptC.x, ptC.y); ctx.lineTo(ptD.x, ptD.y); break;
                            case 2: case 13: ctx.moveTo(ptB.x, ptB.y); ctx.lineTo(ptC.x, ptC.y); break;
                            case 3: case 12: ctx.moveTo(ptB.x, ptB.y); ctx.lineTo(ptD.x, ptD.y); break;
                            case 4: case 11: ctx.moveTo(ptA.x, ptA.y); ctx.lineTo(ptB.x, ptB.y); break;
                            case 5: ctx.moveTo(ptA.x, ptA.y); ctx.lineTo(ptD.x, ptD.y); ctx.moveTo(ptB.x, ptB.y); ctx.lineTo(ptC.x, ptC.y); break;
                            case 6: case 9: ctx.moveTo(ptA.x, ptA.y); ctx.lineTo(ptC.x, ptC.y); break;
                            case 7: case 8: ctx.moveTo(ptA.x, ptA.y); ctx.lineTo(ptD.x, ptD.y); break;
                            case 10: ctx.moveTo(ptA.x, ptA.y); ctx.lineTo(ptB.x, ptB.y); ctx.moveTo(ptC.x, ptC.y); ctx.lineTo(ptD.x, ptD.y); break;
                        }
                    }
                }
                ctx.stroke();
            };

            const render = () => {
              const state = engineState.current; const f = fluidRef.current; const nx = f.nx, ny = f.ny;

              if (state.needsGeometryUpdate) {
                 f.updateGeometry(state.optMode, state.topoGenes, state.nacaCode, state.aoa, state.useFlap, state.flapAngle, state.flapGap, state.flapOverlap, state.useGround, state.rideHeight, nx * 0.35);

                             <select value={viewMode} onChange={(e) => {setViewMode(e.target.value); updateSimState('viewMode', e.target.value); setActivePreset("custom");}} className="bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-sm font-medium focus:border-emerald-500 outline-none">

                               <option value="smoke">Fluid Dye</option>
                               <option value="vof">VOF Surface (CLSVOF/PLIC)</option>
                               <option value="temperature">Thermal Field (Marangoni)</option>
                               <option value="velocity">Velocity Heatmap</option>
                               <option value="vorticity">Vorticity Curl</option>
                               <option value="schlieren">Schlieren (Shockwaves)</option>
                               <option value="les">LES Eddy Viscosity</option>
                             </select>
                             <button onClick={() => {setParticlesEnabled(!particlesEnabled); updateSimState('particlesEnabled', !particlesEnabled); setActivePreset("custom");}} className={`px-3 py-1.5 rounded border transition-colors flex items-center space-x-1 ${particlesEnabled ? 'bg-cyan-900/50 border-cyan-500/50 text-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.2)]' : 'bg-slate-800 border-slate-700 text-slate-500'}`} title="Toggle Tracers">
                               <IconSparkles size={16} /> <span className="text-xs font-bold hidden sm:block">Tracers</span>
                             </button>
                          </div>
                        </div>
                    )}
                  </div>

                  {/* Advanced Kinematic & FSI Controls */}
                  <div className="flex flex-wrap gap-4 items-center bg-slate-950/80 p-2 rounded-xl border border-slate-800 justify-center shadow-inner mt-[-0.5rem] relative z-10 animate-fade-in">
                      {engineState.current.optMode === 'naca' && useFlap && (
                          <>
                              <div className="flex flex-col w-24">
                                  <label className="text-[9px] text-amber-500 font-bold mb-1 flex justify-between uppercase tracking-wider"><span>Flap Deflection</span><span>{flapAngle}°</span></label>

                              </div>
                              <div className="flex flex-col w-24">
                                  <label className="text-[9px] text-amber-500 font-bold mb-1 flex justify-between uppercase tracking-wider"><span>Slot Gap</span><span>{flapGap.toFixed(2)}</span></label>
                                  <input type="range" min="0.0" max="0.15" step="0.01" value={flapGap} onChange={(e) => {setFlapGap(parseFloat(e.target.value)); updateSimState('flapGap', parseFloat(e.target.value)); setActivePreset("custom");}} className="accent-amber-500" />
                              </div>
                              <div className="flex flex-col w-24">
                                  <label className="text-[9px] text-amber-500 font-bold mb-1 flex justify-between uppercase tracking-wider"><span>Overlap</span><span>{flapOverlap.toFixed(2)}</span></label>
                                  <input type="range" min="-0.1" max="0.1" step="0.01" value={flapOverlap} onChange={(e) => {setFlapOverlap(parseFloat(e.target.value)); updateSimState('flapOverlap', parseFloat(e.target.value)); setActivePreset("custom");}} className="accent-amber-500" />
                              </div>
                          </>
                      )}
                      {engineState.current.optMode === 'naca' && useFlap && useGround && <div className="h-6 w-px bg-slate-800 mx-2"></div>}
                      {useGround && (
                          <div className="flex flex-col w-32">
                              <label className="text-[9px] text-rose-500 font-bold mb-1 flex justify-between uppercase tracking-wider"><span>Ride Height</span><span>{(rideHeight*100).toFixed(0)}% Chord</span></label>

                          </div>
                      )}
                      
                      {/* MICROFLUIDICS & FSI CONTROLS */}
                      {engineState.current.vofEnabled && (
                          <>
                              {(useFlap || useGround) && <div className="h-6 w-px bg-slate-800 mx-2"></div>}
                              <div className="flex flex-col w-32">
                                  <label className="text-[9px] text-cyan-400 font-bold mb-1 flex justify-between uppercase tracking-wider"><span>Contact Angle (Wetting)</span><span>{contactAngle}°</span></label>
                                  <input type="range" min="0" max="180" step="5" value={contactAngle} onChange={(e) => {setContactAngle(parseInt(e.target.value)); updateSimState('contactAngle', parseInt(e.target.value)); setActivePreset("custom");}} className="accent-cyan-400" />
                              </div>
                              <div className="flex flex-col">
                                  <button onClick={() => { setUseFSI(!useFSI); updateSimState('useFSI', !useFSI); setActivePreset("custom"); }} className={`flex items-center space-x-1 px-2 py-1 text-xs font-bold rounded border ${useFSI ? 'bg-amber-900/50 border-amber-500 text-amber-400' : 'bg-slate-800 border-slate-700 text-slate-400'}`}>

                              </div>

              <div className="flex-1 flex flex-col lg:flex-row overflow-hidden max-w-screen-2xl w-full mx-auto p-4 gap-4 relative">

                  <canvas ref={canvasRef} onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp} className="w-full h-full object-fill cursor-crosshair touch-none" />
                  {!is3DMode && <ColormapLegend mode={viewMode} />}
                  {machNumber > 0.85 && !is3DMode && engineState.current.optMode === 'naca' && (
                      <div className="absolute top-4 right-4 bg-rose-500/20 text-rose-400 border border-rose-500/50 px-3 py-1 rounded font-mono text-xs font-bold uppercase tracking-wider animate-pulse flex items-center space-x-2 pointer-events-none">
                          <IconActivity size={14} /> <span>Transonic Regime</span>
                      </div>
                  )}
                  <div className="absolute top-4 left-4 bg-slate-900/80 backdrop-blur border border-slate-700/50 p-2 rounded-lg flex space-x-2 opacity-50 group-hover:opacity-100 transition-opacity">
                     <button onClick={() => { setInteractionMode('stir'); updateSimState('interactionMode', 'stir'); }} className={`p-2 rounded ${interactionMode === 'stir' ? 'bg-emerald-500/20 text-emerald-400' : 'text-slate-400 hover:bg-slate-800'}`} title="Stir Fluid"><IconMousePointer2 size={16} /></button>
                     <button onClick={() => { setInteractionMode('heat'); updateSimState('interactionMode', 'heat'); }} className={`p-2 rounded ${interactionMode === 'heat' ? 'bg-rose-500/20 text-rose-400' : 'text-slate-400 hover:bg-slate-800'}`} title="Inject Heat (Marangoni)"><IconFlame size={16} /></button>
                     <button onClick={() => { setInteractionMode('wall'); updateSimState('interactionMode', 'wall'); }} className={`p-2 rounded ${interactionMode === 'wall' ? 'bg-emerald-500/20 text-emerald-400' : 'text-slate-400 hover:bg-slate-800'}`} title="Draw Static Obstacle"><IconPenTool size={16} /></button>
                  </div>
                </div>

                {/* 3D WEBGL VIEWPORT */}
                {is3DMode && <ThreeView fluidRef={fluidRef} is3D={is3DMode} engineState={engineState} width={canvasSize.width} height={canvasSize.height} />}

                {/* TELEMETRY SIDEBAR */}
                <div className={`flex flex-col gap-4 overflow-y-auto pr-1 transition-all duration-500 ${isMaximized ? 'w-full absolute inset-4 z-10' : 'w-full lg:w-[380px] relative z-10'}`}>
                  
                  {/* AI Optimizer Panel */}
                  <div className={`bg-slate-900/90 backdrop-blur border border-slate-800 rounded-xl p-4 shadow-lg shrink-0 relative overflow-hidden ${isMaximized ? 'hidden' : 'hidden xl:block'} ${engineState.current.optMode === 'empty' ? 'hidden' : ''}`}>
                     {isOptimizing && <div className="absolute inset-0 bg-emerald-500/5 animate-pulse pointer-events-none" />}
                     <div className="flex items-center justify-between mb-2 relative">
                         <div className="flex items-center space-x-2">
                             <IconNetwork size={16} className={isOptimizing ? "text-emerald-400" : "text-slate-500"} />
                             <h2 className="text-xs font-bold uppercase tracking-wider text-slate-300">
                                 {engineState.current.optMode === 'topology' ? 'Inverse Topology Optimizer' : 'Genetic AI Optimizer'}
                             </h2>
                         </div>
                         <button onClick={toggleOptimizer} className={`px-2 py-1 rounded text-[10px] font-bold border transition-colors shadow-lg ${isOptimizing ? 'bg-emerald-900/50 border-emerald-500 text-emerald-400' : 'bg-slate-800 border-slate-700 text-slate-400 hover:text-white'}`}> {isOptimizing ? 'STOP AI' : 'START AI'} </button>
                     </div>
                     <div className="grid grid-cols-3 gap-2 relative z-10">
                         <div className="bg-slate-950 p-2 rounded border border-slate-800/50 flex flex-col"><span className="text-[9px] text-slate-500 font-bold tracking-widest uppercase">Generation</span><span className="text-sm font-mono text-white">{isOptimizing ? optDisplay.gen : '-'}</span></div>
                         <div className="bg-slate-950 p-2 rounded border border-slate-800/50 flex flex-col">
                             <span className="text-[9px] text-slate-500 font-bold tracking-widest uppercase">Testing</span>
                             <span className="text-xs font-mono text-cyan-400 break-words leading-tight">{isOptimizing ? (engineState.current.optMode === 'naca' ? nacaCodeUI : "Eval...") : '-'}</span>
                         </div>
                         <div className="bg-slate-950 p-2 rounded border border-slate-800/50 flex flex-col">
                             <span className="text-[9px] text-slate-500 font-bold tracking-widest uppercase">Best Found</span>
                             <span className="text-xs font-mono text-emerald-400 break-words leading-tight">{isOptimizing ? `${optDisplay.bestCode}` : '-'}</span>
                         </div>
                     </div>
                  </div>

                  {/* Metrics Panel */}
                  <div className="bg-slate-900/90 backdrop-blur border border-slate-800 rounded-xl p-5 shadow-lg shrink-0 flex flex-col gap-4 flex-1">
                    <div className="flex items-center justify-between">
                      <div className="flex items-center space-x-2"><IconGauge size={18} className="text-emerald-500" /><h2 className="text-sm font-bold uppercase tracking-wider text-slate-300">Telemetry</h2></div>
                      <div className="flex space-x-2">
                          {engineState.current.optMode === 'naca' && (
                              <button onClick={() => setPinnEnabled(!pinnEnabled)} className={`flex items-center space-x-1 px-2 py-1 text-[10px] font-bold rounded border transition-colors ${pinnEnabled ? 'bg-indigo-900/50 border-indigo-500 text-indigo-400' : 'bg-slate-800 border-slate-700 text-slate-400'}`}> <IconCpu size={10} /> <span>PINN Predict</span> </button>
                          )}
                          <button onClick={() => setIsMaximized(!isMaximized)} className="text-slate-400 hover:text-cyan-400 transition bg-slate-800 p-1.5 rounded border border-slate-700">{isMaximized ? <IconMinimize size={14} /> : <IconMaximize size={14} />}</button>
                      </div>
                    </div>

                    {pinnEnabled && engineState.current.optMode === 'naca' && (
                        <div className="bg-indigo-950/50 border border-indigo-500/30 p-2 rounded flex justify-between items-center text-xs font-mono text-indigo-200">
                            <span className="text-[10px] uppercase font-bold tracking-wider text-indigo-400">Neural Surrogate:</span>
                            <span>CL: {pinnResult.cl}</span><span>CD: {pinnResult.cd}</span>

                    {engineState.current.optMode === 'naca' ? (

                          <div className="bg-slate-950/80 p-3 rounded-lg border border-slate-800/50 flex flex-col"><span className="text-[10px] text-slate-500 font-bold tracking-widest uppercase" title="Pitching Moment (0.25c)">Moment (C_m)</span><span className={`text-xl font-mono ${metrics.cm > 0 ? 'text-amber-400' : 'text-blue-400'}`}>{metrics.cm.toFixed(3)}</span></div>

                                <span className={`text-2xl font-mono ${metrics.cl < -0.5 ? 'text-emerald-400' : 'text-amber-400'}`}>{Math.abs(metrics.cl).toFixed(4)}</span>

                        </div>

                        <div className={`flex flex-col ${isMaximized ? 'flex-1' : ''}`}>
                          <span className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1 flex justify-between">
                              <span>{engineState.current.optMode === 'naca' ? 'Forces Log (Time)' : 'Energy Log'}</span>
                          </span>
                          <div className={`w-full ${isMaximized ? 'h-full' : 'h-[120px]'}`}>
                            {engineState.current.optMode === 'naca' ? (
                                <TelemetryChart data={chartData} lines={[{ key: 'cl', color: '#10b981', label: 'CL', scale: 1 }, { key: 'cd', color: '#f43f5e', label: 'CDx10', scale: 10 }]} />
                            ) : (
                                <TelemetryChart data={chartData} lines={[{ key: 'cl', color: '#10b981', label: 'Energy', scale: -1 }]} />
                            )}
                          </div>
                        </div>

                        {engineState.current.optMode === 'naca' && (
                            <div className={`flex flex-col ${isMaximized ? 'flex-1' : ''}`}>
                              <span className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1" title="Pressure Coefficient along the chord">Cp Distribution (x/c)</span>
                              <div className={`w-full ${isMaximized ? 'h-full' : 'h-[140px]'}`}>
                                 <DistributionChart data={cpData} keys={['cpu', 'cpl']} colors={['#0ea5e9', '#f43f5e']} labels={['Upper', 'Lower']} invertY={true} />
                              </div>
                            </div>
                        )}
                    </div>
                    
                  </div>
                </div>
              </div>

              {/* REPORT OVERLAY (MATLAB STYLE TABBED DASHBOARD) */}
              {showReport && (
                <div className="fixed inset-0 z-50 bg-slate-950/95 backdrop-blur-md flex flex-col p-4 sm:p-8 overflow-hidden">
                    <div className="max-w-7xl w-full mx-auto bg-slate-100 rounded-xl shadow-2xl flex flex-col text-slate-800 h-full max-h-[90vh]">
                        <div className="bg-white border-b border-slate-300 p-6 flex flex-col sm:flex-row justify-between items-center gap-4 shrink-0">
                            <div>
                                <h1 className="text-2xl font-black uppercase tracking-widest text-slate-800 flex items-center gap-2"><IconCheckCircle size={28} className="text-emerald-500"/> Engineering Report</h1>
                                <p className="text-sm font-mono text-slate-500 mt-1">Profile: NACA {nacaCodeUI} {useFlap ? '(w/ Slotted Flap)' : ''} {useGround ? '(In Ground Effect)' : ''} • AoA: {aoa}° • Mach: {machNumber.toFixed(2)}</p>
                            </div>
                            <div className="flex space-x-4">
                                <button onClick={() => handleExportCSV('telemetry')} className="flex items-center space-x-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded shadow transition"><IconDownload size={16} /> <span>Export Data</span></button>
                                <button onClick={() => setShowReport(false)} className="flex items-center space-x-2 bg-slate-200 hover:bg-slate-300 text-slate-700 px-5 py-2 rounded shadow transition"><IconX size={18} /> <span>Close</span></button>
                            </div>
                        </div>

                        <div className="flex border-b border-slate-300 bg-white px-6 shrink-0">
                            <button onClick={() => setReportTab('summary')} className={`px-4 py-3 font-bold text-sm tracking-widest uppercase transition-colors ${reportTab === 'summary' ? 'border-b-2 border-indigo-600 text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>Executive Summary</button>
                            {engineState.current.optMode === 'naca' && <button onClick={() => setReportTab('plots')} className={`px-4 py-3 font-bold text-sm tracking-widest uppercase transition-colors ${reportTab === 'plots' ? 'border-b-2 border-indigo-600 text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>Aerodynamic Plots</button>}
                            {engineState.current.optMode === 'naca' && <button onClick={() => setReportTab('data')} className={`px-4 py-3 font-bold text-sm tracking-widest uppercase transition-colors ${reportTab === 'data' ? 'border-b-2 border-indigo-600 text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>Spatial Data Table</button>}
                        </div>

                        <div className="p-6 bg-slate-50 flex-1 overflow-y-auto report-scroll">
                            {reportTab === 'summary' && (
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
                                    <div className="lg:col-span-1 space-y-6">
                                        <div className="bg-white p-5 rounded border border-slate-200 shadow-sm">
                                            <h3 className="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4 border-b pb-2">{engineState.current.optMode === 'topology' ? 'Optimization Data' : 'Steady-State Forces'}</h3>
                                            
                                            {engineState.current.optMode === 'naca' ? (
                                                <ul className="space-y-4 font-mono text-sm">
                                                    <li className="flex justify-between items-center"><span className="text-slate-500">Lift Coefficient (C_L)</span> <span className="font-bold text-emerald-600 text-lg">{metrics.cl.toFixed(4)}</span></li>
                                                    <li className="flex justify-between items-center"><span className="text-slate-500">Drag Coefficient (C_D)</span> <span className="font-bold text-rose-600 text-lg">{metrics.cd.toFixed(4)}</span></li>
                                                    <li className="flex justify-between items-center"><span className="text-slate-500">Pitch Moment (C_m)</span> <span className="font-bold text-amber-600 text-lg">{metrics.cm.toFixed(4)}</span></li>

                                                </ul>
                                            ) : (
                                                <ul className="space-y-4 font-mono text-sm">
                                                    <li className="flex justify-between items-center"><span className="text-slate-500">Wave Energy (J)</span> <span className="font-bold text-emerald-600 text-lg">{Math.abs(metrics.cl).toFixed(4)}</span></li>
                                                    {engineState.current.optMode === 'topology' && <li className="flex justify-between items-center"><span className="text-slate-500">Breakwater Height</span> <span className="font-bold text-indigo-600 text-lg">{engineState.current.topoGenes.h.toFixed(2)}</span></li>}
                                                    {engineState.current.optMode === 'topology' && <li className="flex justify-between items-center"><span className="text-slate-500">Breakwater Width</span> <span className="font-bold text-indigo-600 text-lg">{engineState.current.topoGenes.w.toFixed(2)}</span></li>}
                                                    {engineState.current.optMode === 'topology' && <li className="flex justify-between items-center"><span className="text-slate-500">Breakwater Angle</span> <span className="font-bold text-indigo-600 text-lg">{engineState.current.topoGenes.theta.toFixed(1)}°</span></li>}
                                                </ul>
                                            )}
                                        </div>
                                        <div className="bg-white p-5 rounded border border-slate-200 shadow-sm">
                                            <h3 className="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4 border-b pb-2">Flow Conditions</h3>
                                            <ul className="space-y-2 font-mono text-sm">
                                                <li className="flex justify-between"><span className="text-slate-500">Regime</span> <span className={machNumber > 0.8 ? 'text-rose-600 font-bold' : ''}>{machNumber > 0.8 ? 'Transonic' : 'Subsonic'}</span></li>
                                                <li className="flex justify-between"><span className="text-slate-500">Reynolds No. (Re)</span> <span>{metrics.re.toExponential(2)}</span></li>
                                                <li className="flex justify-between"><span className="text-slate-500">Density (ρ)</span> <span>{FLUIDS[fluidType].density} kg/m³</span></li>
                                                {engineState.current.optMode === 'naca' && <li className="flex justify-between"><span className="text-slate-500">Total Lift Force</span> <span>{(metrics.rawL/1000).toFixed(2)} kN</span></li>}
                                                {engineState.current.optMode === 'naca' && <li className="flex justify-between"><span className="text-slate-500">Total Drag Force</span> <span>{(metrics.rawD/1000).toFixed(2)} kN</span></li>}
                                            </ul>
                                        </div>
                                    </div>
                                    <div className="lg:col-span-2 space-y-6 flex flex-col">
                                        <div className="bg-white p-5 rounded border border-slate-200 shadow-sm flex-1 flex flex-col">
                                            <h3 className="text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Simulation Convergence</h3>
                                            <div className="flex-1 w-full relative min-h-[250px]">
                                                {engineState.current.optMode === 'topology' ? (
                                                    <TelemetryChart data={chartData} lines={[{ key: 'cl', color: '#059669', label: 'Wave E.', scale: -1 }]} isMatlab={true}/>
                                                ) : (
                                                    <TelemetryChart data={chartData} lines={[{ key: 'cl', color: '#059669', label: 'CL', scale: 1 }, { key: 'cd', color: '#e11d48', label: 'CDx10', scale: 10 }]} isMatlab={true} />
                                                )}
                                            </div>
                                        </div>
                                        <div className="bg-white p-5 rounded border border-slate-200 shadow-sm">
                                            <h3 className="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4 border-b pb-2">Solver Architecture</h3>
                                            <div className="grid grid-cols-2 gap-4 text-xs text-slate-600 leading-relaxed font-mono">
                                                <div><strong>Fluid Dynamics:</strong><br/>• Eulerian Navier-Stokes<br/>• Red-Black SOR Projection<br/>• Real-Time Marching Cubes Mesh</div>
                                                <div><strong>Microfluidic Models:</strong><br/>• CLSVOF (Level-Set + VOF)<br/>• Contact Angle Wetting Enforcer<br/>• Marangoni Thermal Convection</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TAB 2: PLOTS (Only for NACA) */}
                            {reportTab === 'plots' && engineState.current.optMode === 'naca' && (
                                <div className="grid grid-cols-1 gap-6 h-full flex-col">
                                    <div className="bg-white p-5 rounded border border-slate-200 shadow-sm flex-1 flex flex-col min-h-[400px]">
                                        <div className="flex justify-between items-center mb-2"><h3 className="text-xs font-bold uppercase tracking-widest text-slate-400">CFD vs Panel Method: Pressure Distribution (C_p)</h3><span className="text-[10px] font-mono bg-slate-100 px-2 py-1 rounded border text-slate-500">Dashed Lines = Ideal Inviscid Approximation</span></div>
                                        <div className="flex-1 w-full relative"><DistributionChart data={cpData} keys={['cpu', 'cpl', 'panelCpU', 'panelCpL']} colors={['#0ea5e9', '#f43f5e', '#94a3b8', '#94a3b8']} labels={['Viscous Upper', 'Viscous Lower', 'Ideal Upper', 'Ideal Lower']} isMatlab={true} invertY={true} /></div>
                                    </div>
                                    <div className="bg-white p-5 rounded border border-slate-200 shadow-sm flex-1 flex flex-col min-h-[300px]">
                                        <h3 className="text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Skin Friction Distribution (C_f × 100)</h3>
                                        <div className="flex-1 w-full relative"><DistributionChart data={cpData} keys={['cfu', 'cfl']} colors={['#8b5cf6', '#d946ef']} labels={['Upper Surface', 'Lower Surface']} isMatlab={true} invertY={false} /></div>
                                    </div>
                                </div>
                            )}

                            {/* TAB 3: DATA TABLE (Only for NACA) */}
                            {reportTab === 'data' && engineState.current.optMode === 'naca' && (
                                <div className="bg-white rounded border border-slate-200 shadow-sm h-full flex flex-col overflow-hidden">
                                    <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                                        <h3 className="text-xs font-bold uppercase tracking-widest text-slate-500">Spatial Chordwise Data (x/c)</h3>
                                        <button onClick={() => {
                                            let csv = "x/c,Cp_Upper,Cp_Lower,Cf_Upper,Cf_Lower,Ideal_Cp_Upper,Ideal_Cp_Lower\n";
                                            cpData.forEach(row => { csv += `${row.x.toFixed(4)},${(row.cpu||0).toFixed(4)},${(row.cpl||0).toFixed(4)},${(row.cfu||0).toFixed(4)},${(row.cfl||0).toFixed(4)},${(row.panelCpU||0).toFixed(4)},${(row.panelCpL||0).toFixed(4)}\n`; });
                                            const blob = new Blob([csv], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `aerosuite_cp_dist_${nacaCodeUI}_M${machNumber}.csv`; a.click(); URL.revokeObjectURL(url);
                                        }} className="flex items-center space-x-1 bg-white hover:bg-slate-100 text-indigo-600 border border-indigo-200 px-3 py-1.5 rounded text-xs font-bold shadow-sm transition">
                                            <IconDownload size={12} /> <span>Download CSV</span>
                                        </button>
                                    </div>
                                    <div className="flex-1 overflow-auto report-scroll">
                                        <table className="min-w-full text-sm text-right font-mono border-collapse">
                                            <thead className="bg-slate-100 text-slate-500 sticky top-0 shadow-sm z-10">
                                                <tr>
                                                    <th className="px-4 py-3 text-left border-b border-slate-200 font-bold">x/c (Chord)</th>
                                                    <th className="px-4 py-3 border-b border-slate-200 text-sky-600">Cp (Upper)</th>
                                                    <th className="px-4 py-3 border-b border-slate-200 text-rose-600">Cp (Lower)</th>
                                                    <th className="px-4 py-3 border-b border-slate-200 text-slate-400 font-normal">Ideal Cp (Up)</th>
                                                    <th className="px-4 py-3 border-b border-slate-200 text-slate-400 font-normal">Ideal Cp (Low)</th>
                                                    <th className="px-4 py-3 border-b border-slate-200 text-violet-500">Cf (Upper)</th>
                                                    <th className="px-4 py-3 border-b border-slate-200 text-fuchsia-500">Cf (Lower)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="text-slate-600">
                                                {cpData.length === 0 ? <tr><td colSpan="7" className="text-center py-8 text-slate-400 italic">No data generated yet. Run simulation first.</td></tr> : cpData.map((row, i) => (
                                                        <tr key={i} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                                            <td className="px-4 py-2 text-left font-bold text-slate-700">{row.x.toFixed(4)}</td>
                                                            <td className="px-4 py-2 text-sky-700">{(row.cpu || 0).toFixed(4)}</td>
                                                            <td className="px-4 py-2 text-rose-700">{(row.cpl || 0).toFixed(4)}</td>
                                                            <td className="px-4 py-2 text-slate-400">{(row.panelCpU || 0).toFixed(4)}</td>
                                                            <td className="px-4 py-2 text-slate-400">{(row.panelCpL || 0).toFixed(4)}</td>
                                                            <td className="px-4 py-2 text-violet-600">{(row.cfu || 0).toFixed(4)}</td>
                                                            <td className="px-4 py-2 text-fuchsia-600">{(row.cfl || 0).toFixed(4)}</td>
                                                        </tr>
                                                    ))
                                                }
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
